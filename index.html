<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MC News</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --neon: #72FF13;
            --bg: #080808;
            --card: rgba(255, 255, 255, 0.05);
            --ds-blurple: #5865F2;
        }

        * { 
            box-sizing: border-box; margin: 0; padding: 0; 
            font-weight: 900 !important; font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg); color: white;
            height: 100vh; width: 100vw; overflow: hidden;
        }

        /* SFONDO MODIFICATO: PIÙ VISIBILE E SFOCATO */
        .bg-img {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            /* Ridotto l'oscuramento (da 0.7 a 0.35) per mostrare meglio l'immagine */
            background: linear-gradient(rgba(0,0,0,0.35), var(--bg)), 
                        url('https://server.wallpaperalchemy.com/storage/wallpapers/259/minecraft-4k-wallpaper-sunlit-forest-canopy.jpg');
            background-size: cover; background-position: center;
            filter: blur(10px); z-index: -1;
            transform: scale(1.1);
        }

        header { padding: 30px 25px; display: flex; justify-content: space-between; align-items: center; }
        /* NOME CAMBIATO IN MC NEWS */
        .logo { font-size: 1.8rem; text-transform: uppercase; letter-spacing: -1.5px; }
        .logo span { color: var(--neon); text-shadow: 0 0 15px var(--neon); }

        .ds-btn {
            width: 55px; height: 55px; background: var(--ds-blurple); border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 25px rgba(88, 101, 242, 0.5); transition: 0.3s;
        }
        .ds-btn:active { transform: scale(0.85); }
        .ds-btn svg { width: 32px; height: 32px; fill: white; }

        .viewport { width: 100vw; height: calc(100vh - 210px); overflow: hidden; position: relative; }
        .wrapper { display: flex; width: 400vw; height: 100%; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .section { width: 100vw; height: 100%; overflow-y: auto; padding: 10px 20px 220px; -webkit-overflow-scrolling: touch; }

        .card {
            background: var(--card); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 24px;
            padding: 22px; margin-bottom: 15px; cursor: pointer; transition: 0.3s;
        }
        .card:active { border-color: var(--neon); transform: scale(0.97); }
        .card h2 { font-size: 1.1rem; color: #fff; text-transform: uppercase; margin-bottom: 5px; }
        .card p { font-size: 0.85rem; color: #aaa; line-height: 1.4; }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 10000;
            display: none; padding: 40px 25px; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .modal-box { 
            max-width: 500px; width: 100%; text-align: center;
            transform: translateY(100px) scale(0.8); 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal.active { display: flex; opacity: 1; }
        .modal.active .modal-box { transform: translateY(0) scale(1); }
        .modal.closing .modal-box { transform: translateY(100px) scale(0.7); opacity: 0; }

        .modal h1 { color: var(--neon); font-size: 2.2rem; margin-bottom: 10px; text-transform: uppercase; text-shadow: 0 0 15px var(--neon); }
        .modal p { font-size: 1.1rem; line-height: 1.8; color: #ddd; margin-bottom: 40px; }
        
        .btn-action {
            background: var(--neon); color: #000; padding: 20px; width: 100%;
            border-radius: 20px; text-align: center; font-size: 1.1rem; cursor: pointer; margin-bottom: 10px;
        }
        .btn-ds { background: var(--ds-blurple); color: white; border: none; font-size: 1.3rem; }

        .footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 30px 0; text-align: center; }
        .label { color: var(--neon); font-size: 0.8rem; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 15px; }
        .dots { display: flex; gap: 15px; justify-content: center; }
        .dot { width: 10px; height: 10px; background: rgba(255,255,255,0.2); border-radius: 50%; transition: 0.4s; }
        .dot.active { background: var(--neon); transform: scale(1.6); box-shadow: 0 0 15px var(--neon); }
    </style>
</head>
<body>

    <div class="bg-img"></div>

    <header>
        <div class="logo">MC <span>News</span></div>
        <div class="ds-btn" onclick="openDS()">
            <svg viewBox="0 0 127.14 96.36">
                <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83,96.88,96.88,0,0,0-29.06,0A72.82,72.82,0,0,0,45.68,0,105.89,105.89,0,0,0,19.44,8.07C3.57,31.78-0.77,54.89,1.41,77.56a107.53,107.53,0,0,0,32.44,16.34,80.7,80.7,0,0,0,6.83-11.06,68.52,68.52,0,0,1-10.87-5.19c.92-.66,1.81-1.35,2.65-2.07a76.4,76.4,0,0,0,62.1,0c.87.72,1.75,1.41,2.68,2.07a69.05,69.05,0,0,1-10.87,5.19,81.21,81.21,0,0,0,6.83,11.06,107.13,107.13,0,0,0,32.44-16.34C128.84,50.7,119.34,28.09,107.7,8.07ZM42.45,65.69c-6.39,0-11.69-5.87-11.69-13.06s5.16-13.06,11.69-13.06,11.72,5.87,11.72,13.06S48.9,65.69,42.45,65.69Zm42.24,0c-6.39,0-11.69-5.87-11.69-13.06s5.16-13.06,11.69-13.06,11.72,5.87,11.72,13.06S84.75,65.69,84.69,65.69Z"/>
            </svg>
        </div>
    </header>

    <div id="modal" class="modal">
        <div class="modal-box">
            <h1 id="mT"></h1>
            <p id="mP"></p>
            <div class="btn-action" onclick="closeAll()">CHIUDI</div>
        </div>
    </div>

    <div id="ds-modal" class="modal">
        <div class="modal-box">
            <h1 style="color: white;">DISCORD</h1>
            <h1 style="color: var(--ds-blurple); margin-top: -15px;">MagicMC</h1>
            <p>Stai per entrare nella community ufficiale di MagicMC. Sei pronto?</p>
            <div class="btn-action btn-ds" onclick="joinDS()">ENTRA ORA</div>
            <div class="btn-action" style="background:transparent; color:white; border:2px solid #333;" onclick="closeAll()">ANNULLA</div>
        </div>
    </div>

    <div class="viewport">
        <div class="wrapper" id="wrap">
            <div class="section" id="sec-news"></div>
            <div class="section" id="sec-servers"></div>
            <div class="section" id="sec-mods"></div>
            <div class="section" id="sec-cheats"></div>
        </div>
    </div>

    <div class="footer">
        <div class="label" id="cur-lab">NEWS</div>
        <div class="dots">
            <div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
    </div>

        function fill(d, id) {
            const l = document.getElementById(id);
            d.forEach(x => {
                const e = document.createElement('div');
                e.className = 'card';
                e.onclick = () => openM(x.t, x.f);
                e.innerHTML = `<h2>${x.t}</h2><p>${x.d}</p>`;
                l.appendChild(e);
            });
        }

        fill(newsData, 'sec-news'); fill(serverData, 'sec-servers'); fill(modData, 'sec-mods'); fill(cheatData, 'sec-cheats');

        const modals = [document.getElementById('modal'), document.getElementById('ds-modal')];
        
        function openM(t, p) { 
            document.getElementById('mT').innerText = t; 
            document.getElementById('mP').innerText = p; 
            document.getElementById('modal').style.display = 'flex';
            setTimeout(() => document.getElementById('modal').classList.add('active'), 10);
        }
        
        function openDS() { 
            document.getElementById('ds-modal').style.display = 'flex';
            setTimeout(() => document.getElementById('ds-modal').classList.add('active'), 10);
        }

        function closeAll() {
            modals.forEach(m => {
                if(m.classList.contains('active')) {
                    m.classList.add('closing');
                    setTimeout(() => {
                        m.classList.remove('active', 'closing');
                        m.style.display = 'none';
                    }, 400);
                }
            });
        }

        function joinDS() { window.open("https://discord.gg/xY9HNSKEvB", "_blank"); closeAll(); }

        const wrap = document.getElementById('wrap'), dots = document.querySelectorAll('.dot'), lab = document.getElementById('cur-lab');
        let cur = 0, sX = 0, sY = 0;

        function update(i) {
            cur = i; wrap.style.transform = `translateX(-${i * 100}vw)`;
            dots.forEach((d, k) => d.classList.toggle('active', k === i));
            lab.innerText = labs[i];
        }

        document.addEventListener('touchstart', e => { sX = e.touches[0].clientX; sY = e.touches[0].clientY; }, {passive: true});
        document.addEventListener('touchend', e => {
            let dX = sX - e.changedTouches[0].clientX, dY = sY - e.changedTouches[0].clientY;
            if (Math.abs(dX) > 70 && Math.abs(dX) > Math.abs(dY)) {
                if (dX > 0 && cur < 3) update(cur + 1);
                else if (dX < 0 && cur > 0) update(cur - 1);
            }
        });

</html>
