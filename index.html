<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MC News Pro</title>
    <style>
        /* SETUP GENERALE - TUTTO IN GRASSETTO */
        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0; 
            font-weight: 900 !important; 
            font-family: 'Arial Black', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            color: white;
            background-color: #000;
            overflow: hidden; /* Gestiamo lo scroll internamente */
            height: 100vh;
        }

        /* SFONDO RICHIESTO (MENO SFOCATO) */
        .bg-mc {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.5)), 
                              url('https://server.wallpaperalchemy.com/storage/wallpapers/259/minecraft-4k-wallpaper-sunlit-forest-canopy.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(3px); /* Sfocatura ridotta come richiesto */
            z-index: -1;
            transform: scale(1.05);
        }

        /* HEADER */
        header { 
            padding: 40px 20px 10px; 
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
        }
        .logo { font-size: 2.2rem; text-transform: uppercase; letter-spacing: -2px; }
        .logo span { color: #72FF13; text-shadow: 0 0 15px #72FF13; }

        /* CONTENITORE SLIDE (SWIPE) */
        .wrapper {
            display: flex;
            width: 300vw; /* 3 sezioni */
            height: calc(100vh - 180px);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .section {
            width: 100vw;
            height: 100%;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 100px;
        }

        /* CARD MODERNE GLASS */
        .card {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .img-news { width: 100%; border-radius: 15px; margin-bottom: 10px; border: 2px solid #72FF13; }

        /* BARRA SOTTO MODERNA */
        .nav-container {
            position: fixed;
            bottom: 25px; left: 20px; right: 20px;
            z-index: 999;
        }

        .nav-bar {
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(25px);
            border-radius: 25px;
            display: flex;
            padding: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .nav-btn {
            flex: 1;
            border: none; background: none;
            color: white; font-size: 0.75rem;
            padding: 15px 0;
            z-index: 2;
            transition: 0.3s;
            opacity: 0.5;
        }

        .nav-btn.selected {
            opacity: 1;
            color: #72FF13;
        }

        /* INDICATORE MOBILE NELLA BARRA */
        .nav-indicator {
            position: absolute;
            height: 80%;
            width: calc(33.33% - 10px);
            background: rgba(114, 255, 19, 0.15);
            border: 1px solid #72FF13;
            border-radius: 18px;
            top: 10%;
            left: 5px;
            transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 1;
        }

        .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="bg-mc"></div>

    <header>
        <div class="logo">MC <span>NEWS</span></div>
    </header>

    <div class="wrapper" id="mainWrapper">
        
        <div class="section">
            <div class="card">
                <img src="https://www.minecraft.net/content/dam/games/minecraft/key-art/Minecraft_Standard-Edition_Key-Art_1170x500.jpg" class="img-news">
                <h2 style="color:#72FF13">NUOVO UPDATE</h2>
                <p>ESPLORA LE TRIAL CHAMBERS OGGI STESSO!</p>
            </div>
            <div class="card">
                <h2>SERVER PREMIUM</h2>
                <p>NUOVI CONTENUTI AGGIUNTI AL MARKETPLACE.</p>
            </div>
        </div>

        <div class="section">
            <div class="card">
                <h2 style="color:#72FF13; margin-bottom:15px;">STATO SERVER</h2>
                <div class="row"><span>HYPIXEL</span> <span style="color:#72FF13">ONLINE</span></div>
                <div class="row"><span>CORAL MC</span> <span style="color:#72FF13">ONLINE</span></div>
                <div class="row" style="border:none"><span>PIKANET</span> <span style="color:#72FF13">ONLINE</span></div>
            </div>
        </div>

        <div class="section">
            <div class="card">
                <h2 style="color:#72FF13">OPTIMINE MOD</h2>
                <p>MASSIMIZZA LE PERFORMANCE DEL GIOCO.</p>
                <div style="background:#72FF13; color:#000; padding:15px; border-radius:15px; margin-top:20px; text-align:center;">INSTALLA</div>
            </div>
        </div>

    </div>

    <div class="nav-container">
        <div class="nav-bar">
            <div class="nav-indicator" id="indicator"></div>
            <button class="nav-btn selected" onclick="moveTo(0)">NEWS</button>
            <button class="nav-btn" onclick="moveTo(1)">SERVER</button>
            <button class="nav-btn" onclick="moveTo(2)">MODS</button>
        </div>
    </div>

    <script>
        const wrapper = document.getElementById('mainWrapper');
        const indicator = document.getElementById('indicator');
        const buttons = document.querySelectorAll('.nav-btn');
        let currentSection = 0;
        let startX = 0;

        // Funzione per muoversi tra le sezioni
        function moveTo(index) {
            currentSection = index;
            wrapper.style.transform = `translateX(-${index * 100}vw)`;
            
            // Aggiorna Bottoni
            buttons.forEach((btn, i) => {
                btn.classList.toggle('selected', i === index);
            });
            
            // Muovi indicatore barra
            indicator.style.left = `calc(${index * 33.33}% + 5px)`;
            
            if(window.navigator.vibrate) window.navigator.vibrate(15);
        }

        // LOGICA SWIPE (Touch)
        document.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
        });

        document.addEventListener('touchend', e => {
            const endX = e.changedTouches[0].clientX;
            const diff = startX - endX;

            if (Math.abs(diff) > 50) { // Sensibilità swipe
                if (diff > 0 && currentSection < 2) {
                    moveTo(currentSection + 1); // Swipe Sinistra -> Va a destra
                } else if (diff < 0 && currentSection > 0) {
                    moveTo(currentSection - 1); // Swipe Destra -> Va a sinistra
                }
            }
        });
    </script>

</body>
</html>
